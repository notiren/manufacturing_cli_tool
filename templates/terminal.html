<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ script_desc }} — Terminal</title>
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111827;
            color: #e5e7eb;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            gap: 16px;
        }
        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            background: #374151;
            color: #e5e7eb;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #4b5563; }
        h2 {
            font-size: 18px;
            color: #f9fafb;
        }
        .status {
            margin-left: auto;
            font-size: 13px;
            color: #9ca3af;
        }
        .status.running { color: #22c55e; }
        .status.done    { color: #9ca3af; }
        #terminal-container {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #374151;
        }
        #terminal {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="back-btn">← Back</a>
        <h2>▶ {{ script_desc }}</h2>
        <span class="status running" id="status">● Running...</span>
    </div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <script>
        const term = new Terminal({
            cursorBlink: true,
            scrollback: 5000,
            fontSize: 14,
            fontFamily: 'Consolas, "Courier New", monospace',
            theme: {
                background: '#0f172a',
                foreground: '#e5e7eb',
                cursor: '#3b82f6',
                selectionBackground: '#3b82f633',
            }
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();
        window.addEventListener('resize', () => fitAddon.fit());

        const socket = io();
        let inputBuffer = '';
        let scriptDone = false;

        socket.on('connect', () => {
            socket.emit('start_script', { script_key: '{{ script_key }}' });
        });

        socket.on('clear_terminal', () => {
            scriptDone = false;
            inputBuffer = '';
            term.reset();
            term.reset();
            document.getElementById('status').textContent = '● Running...';
            document.getElementById('status').className = 'status running';
        });

        socket.on('output', (data) => {
            term.write(data.data.replace(/\r\n|\r|\n/g, '\r\n'));
        });

        socket.on('script_done', () => {
            scriptDone = true;
            document.getElementById('status').textContent = '● Finished';
            document.getElementById('status').className = 'status done';
        });

        // Keyboard input — send line by line on Enter
        term.onKey(({ key, domEvent }) => {
            if (scriptDone) return;
            const code = domEvent.keyCode;

            if (code === 13) {              // Enter
                term.write('\r\n');
                socket.emit('input', { data: inputBuffer + '\n' });
                inputBuffer = '';
            } else if (code === 8) {        // Backspace
                if (inputBuffer.length > 0) {
                    inputBuffer = inputBuffer.slice(0, -1);
                    term.write('\b \b');
                }
            } else if (domEvent.ctrlKey && key === 'c') {
                socket.emit('input', { data: '\x03' });
            } else if (!domEvent.ctrlKey && !domEvent.altKey) {
                inputBuffer += key;
                term.write(key);
            }
        });
    </script>
</body>
</html>
